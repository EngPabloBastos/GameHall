<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/site/favicon_final.png">
</head>

<body>
    <header class="cabecalho">
        <div class="logo">
            <a href="index.html">
                <img src="assets/site/gamehall_logo.png" alt="logo gamehall">
            </a>
        </div>
        <nav class="navegacao">
            <a href="sobre.html">Sobre</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <section class="contato">
        <h1>Fale com a gente</h1>
        <p>Tem uma sugestão de jogo ou quer entrar em contato? Envie uma mensagem.</p>

        <form id="form-contato">
            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>
            </div>

            <div class="campo">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="campo">
                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="00000-000">
            </div>

            <div class="campo">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" readonly>
            </div>

            <div class="campo">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="4" required></textarea>
            </div>

            <button type="submit">Enviar</button>
        </form>

        <div id="confirmacao" class="confirmacao"></div>
    </section>

    <footer class="rodape">
        <p>Desenvolvido por Pablo Bastos</p>
        <div class="redes">
            <a href="https://github.com/EngPabloBastos" target="_blank">
                <img src="assets/site/icon-github.svg" alt="GitHub">
            </a>
            <a href="https://linkedin.com/in/bastospablo" target="_blank">
                <img src="assets/site/icon-linkedin.svg" alt="LinkedIn">
            </a>
            <a href="https://instagram.com/pablobastos__" target="_blank">
                <img src="assets/site/icon-instagram.svg" alt="Instagram">
            </a>
        </div>
    </footer>

    <script src="js/contato.js"></script>
</body>

</html>
